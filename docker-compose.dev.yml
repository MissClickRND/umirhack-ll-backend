name: backnew-dev

services:
  postgres:
    image: postgres:17-alpine
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-backnew}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-backnew}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  auth-service:
    build:
      context: ./services/auth-service
      target: development
    env_file:
      - ./.env
    environment:
      PORT: 3001
      DATABASE_URL: ${AUTH_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/backnew?schema=auth}
    command: npm run start:dev
    volumes:
      - ./services/auth-service:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3001"

  auth-gate:
    build:
      context: ./services/auth-gate
      target: development
    env_file:
      - ./.env
    environment:
      PORT: 3002
    command: npm run start:dev
    volumes:
      - ./services/auth-gate:/app
      - /app/node_modules
    expose:
      - "3002"

  posts-service:
    build:
      context: ./services/posts-service
      target: development
    env_file:
      - ./.env
    environment:
      PORT: 3003
      DATABASE_URL: ${POSTS_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/backnew?schema=posts}
    command: npm run start:dev
    volumes:
      - ./services/posts-service:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3003"

  notes-service:
    build:
      context: ./services/notes-service
      target: development
    env_file:
      - ./.env
    environment:
      PORT: 3004
      NOTES_DATABASE_URL: ${NOTES_DATABASE_URL:-postgresql+psycopg2://postgres:postgres@postgres:5432/backnew}
      NOTES_DB_SCHEMA: ${NOTES_DB_SCHEMA:-notes}
    command: uvicorn app.main:app --host 0.0.0.0 --port 3004 --reload
    volumes:
      - ./services/notes-service:/app
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3004"

  auth-proxy:
    build:
      context: ./services/auth-proxy
      target: development
    env_file:
      - ./.env
    environment:
      PORT: 3000
    command: npm run start:dev
    volumes:
      - ./services/auth-proxy:/app
      - /app/node_modules
    depends_on:
      - auth-service
      - auth-gate
      - posts-service
      - notes-service
    ports:
      - "3000:3000"

volumes:
  postgres_data:
