services:
  user-service:
    command: >
      sh -c "
      if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then npm ci; fi;
      npx prisma generate;
      npm run start:dev
      "
    volumes:
      - ./services/user-service:/app
      - user_service_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"

  auth-service:
    command: >
      sh -c "
      if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then npm ci; fi;
      npx prisma generate;
      npm run start:dev
      "
    volumes:
      - ./services/auth-service:/app
      - auth_service_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"

  post-service:
    command: uvicorn app.main:app --host 0.0.0.0 --port ${POST_SERVICE_PORT} --reload
    volumes:
      - ./services/post-service:/app
    environment:
      AUTH_SERVICE_URL: http://host.docker.internal:${PORT}
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  user_service_node_modules:
  auth_service_node_modules:
