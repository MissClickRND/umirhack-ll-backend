name: Backend CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Validate and build docker stack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare environment file
        run: cp .env.example .env

      - name: Validate production compose file
        run: docker compose -f docker-compose.yml config -q

      - name: Validate development compose file
        run: docker compose -f docker-compose.dev.yml config -q

      - name: Build production images
        run: docker compose -f docker-compose.yml build

  deploy:
    name: Deploy to VPS
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Deploy backend stack on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          BACKEND_PROJECT_DIR: ${{ secrets.BACKEND_PROJECT_DIR }}
          BACKEND_ENV_FILE: ${{ secrets.BACKEND_ENV_FILE }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT != '' && secrets.VPS_PORT || 22 }}
          script_stop: true
          envs: BACKEND_PROJECT_DIR,BACKEND_ENV_FILE
          script: |
            set -euo pipefail
            PROJECT_DIR="${BACKEND_PROJECT_DIR:-/opt/umirhack-backend/umirhack-ll-backend}"

            if [ ! -d "$PROJECT_DIR/.git" ]; then
              echo "Repository not found in $PROJECT_DIR"
              exit 1
            fi

            cd "$PROJECT_DIR"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            if [ -n "${BACKEND_ENV_FILE:-}" ]; then
              printf '%s\n' "$BACKEND_ENV_FILE" > .env
              echo "Updated .env from BACKEND_ENV_FILE secret"
            elif [ ! -f ".env" ]; then
              cp .env.example .env
              echo "Created .env from .env.example"
            fi

            docker compose up -d --build --remove-orphans
            docker compose ps
