name: Backend CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/backend_db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to VPS
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          BACKEND_PROJECT_DIR: ${{ secrets.BACKEND_PROJECT_DIR }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          envs: BACKEND_PROJECT_DIR
          script: |
            set -euo pipefail

            BASE_DIR="${BACKEND_PROJECT_DIR}"
            if [ -z "${BASE_DIR}" ]; then
              echo "BACKEND_PROJECT_DIR is empty"
              exit 1
            fi

            if [ ! -d "${BASE_DIR}" ]; then
              echo "Directory does not exist: ${BASE_DIR}"
              exit 1
            fi

            if [ -f "${BASE_DIR}/docker-compose.prod.yml" ]; then
              PROJECT_DIR="${BASE_DIR}"
            elif [ -f "${BASE_DIR}/backend/docker-compose.prod.yml" ]; then
              PROJECT_DIR="${BASE_DIR}/backend"
            else
              FOUND_COMPOSE="$(find "${BASE_DIR}" -maxdepth 4 -type f -name docker-compose.prod.yml | head -n 1 || true)"
              if [ -n "${FOUND_COMPOSE}" ]; then
                PROJECT_DIR="$(dirname "${FOUND_COMPOSE}")"
              else
                echo "docker-compose.prod.yml not found under ${BASE_DIR}"
                exit 1
              fi
            fi

            cd "${PROJECT_DIR}"

            if ! git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
              echo "${PROJECT_DIR} is not a git repository"
              exit 1
            fi

            if [ ! -f ".env" ]; then
              echo ".env not found in ${PROJECT_DIR}"
              echo "Create it from .env.example before deploy"
              exit 1
            fi

            BRANCH="main"
            git fetch origin "${BRANCH}"
            if git show-ref --verify --quiet "refs/heads/${BRANCH}"; then
              git checkout "${BRANCH}"
            else
              git checkout -b "${BRANCH}" "origin/${BRANCH}"
            fi
            git pull --ff-only origin "${BRANCH}"

            if docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE="docker-compose"
            else
              echo "docker compose is not installed"
              exit 1
            fi

            ${COMPOSE} -f docker-compose.prod.yml up -d --build
            ${COMPOSE} -f docker-compose.prod.yml ps
            ${COMPOSE} -f docker-compose.prod.yml logs backend --tail=50
