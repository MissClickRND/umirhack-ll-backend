name: Backend CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/backend_db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to VPS
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          BACKEND_PROJECT_DIR: ${{ secrets.BACKEND_PROJECT_DIR }}
          BACKEND_COMPOSE_FILE: ${{ secrets.BACKEND_COMPOSE_FILE }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          envs: BACKEND_PROJECT_DIR,BACKEND_COMPOSE_FILE
          script: |
            set -u

            log() {
              echo "[deploy] $*"
            }

            fail() {
              echo "[deploy][error] $*"
              exit 1
            }

            log "whoami=$(whoami 2>/dev/null || echo unknown)"
            log "pwd=$(pwd)"

            BASE_DIR_RAW="${BACKEND_PROJECT_DIR:-/opt/umirhack-backend/umirhack-ll-backend}"
            BASE_DIR="$(printf '%s' "${BASE_DIR_RAW}" | tr -d '\r\n')"
            log "BACKEND_PROJECT_DIR=${BASE_DIR}"

            [ -d "${BASE_DIR}" ] || fail "Directory does not exist: ${BASE_DIR}"

            if [ -f "${BASE_DIR}/docker-compose.prod.yml" ] || [ -f "${BASE_DIR}/docker-compose.yml" ]; then
              PROJECT_DIR="${BASE_DIR}"
            elif [ -f "${BASE_DIR}/backend/docker-compose.prod.yml" ] || [ -f "${BASE_DIR}/backend/docker-compose.yml" ]; then
              PROJECT_DIR="${BASE_DIR}/backend"
            else
              FOUND_COMPOSE="$(find "${BASE_DIR}" -maxdepth 4 -type f \( -name docker-compose.prod.yml -o -name docker-compose.yml \) | head -n 1 || true)"
              [ -n "${FOUND_COMPOSE}" ] || fail "No compose file found under ${BASE_DIR}"
              PROJECT_DIR="$(dirname "${FOUND_COMPOSE}")"
            fi

            log "Resolved PROJECT_DIR=${PROJECT_DIR}"

            cd "${PROJECT_DIR}" || fail "Cannot cd to ${PROJECT_DIR}"
            log "Project files:"
            ls -la | sed -n '1,80p'

            if git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
              [ -w ".git" ] || fail "No write access to ${PROJECT_DIR}/.git. Fix on VPS: sudo chown -R $(whoami):$(whoami) ${PROJECT_DIR}"
              BRANCH="main"
              git fetch origin "${BRANCH}" || fail "git fetch failed"
              if git show-ref --verify --quiet "refs/heads/${BRANCH}"; then
                git checkout "${BRANCH}" || fail "git checkout ${BRANCH} failed"
              else
                git checkout -b "${BRANCH}" "origin/${BRANCH}" || fail "git checkout -b ${BRANCH} failed"
              fi
              git pull --ff-only origin "${BRANCH}" || fail "git pull failed"
            else
              log "Warning: ${PROJECT_DIR} is not a git repository, skipping git pull"
            fi

            [ -f ".env" ] || fail ".env not found in ${PROJECT_DIR}. Create it from .env.example"

            COMPOSE_FILE=""
            if [ -n "${BACKEND_COMPOSE_FILE:-}" ]; then
              [ -f "${BACKEND_COMPOSE_FILE}" ] || fail "BACKEND_COMPOSE_FILE is set but file not found: ${BACKEND_COMPOSE_FILE}"
              COMPOSE_FILE="${BACKEND_COMPOSE_FILE}"
            elif [ -f "docker-compose.prod.yml" ]; then
              COMPOSE_FILE="docker-compose.prod.yml"
            elif [ -f "docker-compose.yml" ]; then
              COMPOSE_FILE="docker-compose.yml"
            else
              fail "No compose file found in ${PROJECT_DIR}. Expected docker-compose.prod.yml or docker-compose.yml"
            fi

            if docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
            elif command -v sudo >/dev/null 2>&1 && sudo docker compose version >/dev/null 2>&1; then
              COMPOSE="sudo docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE="docker-compose"
            elif command -v sudo >/dev/null 2>&1 && sudo docker-compose version >/dev/null 2>&1; then
              COMPOSE="sudo docker-compose"
            else
              fail "docker compose is not available for current user"
            fi

            log "Using compose command: ${COMPOSE}"
            log "Using compose file: ${COMPOSE_FILE}"

            if ! ${COMPOSE} -f "${COMPOSE_FILE}" up -d --build; then
              log "compose up failed, current docker published ports:"
              if command -v docker >/dev/null 2>&1; then
                docker ps --format 'table {{.Names}}\t{{.Ports}}' || true
              fi
              fail "compose up failed"
            fi
            ${COMPOSE} -f "${COMPOSE_FILE}" ps || fail "compose ps failed"
            ${COMPOSE} -f "${COMPOSE_FILE}" logs backend --tail=50 || true
